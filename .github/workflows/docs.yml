name: Build and Deploy Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'examples/**'
      - '+uff/**'
      - '+midprocess/**'
      - '+postprocess/**'
      - '+preprocess/**'
      - '+tools/**'
      - '*.m'
      - 'generate_examples_index.py'
  pull_request:
    paths:
      - 'docs/**'
      - 'examples/**'
      - '+uff/**'
      - '+midprocess/**'
      - '+postprocess/**'
      - '+preprocess/**'
      - '+tools/**'
      - '*.m'
      - 'generate_examples_index.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MEX dependencies
        run: sudo apt-get update && sudo apt-get install -y libtbb2

      # --- Sphinx API docs ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Sphinx dependencies
        run: pip install -r docs/requirements.txt

      - name: Build API documentation
        run: sphinx-build -b html docs docs/_build/html

      # --- MATLAB example publishing ---
      - uses: matlab-actions/setup-matlab@v2
        with:
          products: Signal_Processing_Toolbox

      - name: Publish examples to HTML
        uses: matlab-actions/run-command@v2
        with:
          command: publish_all_examples(fullfile(pwd,'docs','_build','html','examples'), true)

      # --- Generate examples index ---
      - name: Generate examples index page
        run: python generate_examples_index.py docs/_build/html/examples

      # --- Upload combined site ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
