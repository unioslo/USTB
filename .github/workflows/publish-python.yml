name: Publish Python Package to PyPI

on:
  push:
    tags:
      - 'releases/python/v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package with dev dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: python
        run: pytest tests/test_enums.py tests/test_apodization.py tests/test_beamformed_data.py tests/test_das.py -v

  build:
    name: Build Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/releases/python/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building ustb version: $TAG"

      - name: Set version in pyproject.toml
        working-directory: python
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          grep "^version" pyproject.toml

      - name: Build sdist and wheel
        working-directory: python
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ustb-${{ steps.version.outputs.version }}
          path: python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ustb/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ustb-${{ steps.version.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/releases/python/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ustb-${{ steps.version.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          name: Python USTB v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
