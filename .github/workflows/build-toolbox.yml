name: Build USTB Toolbox

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Package USTB Toolbox
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building USTB toolbox version: $TAG"

      - name: Build toolbox
        uses: matlab-actions/run-command@v2
        with:
          command: |
            version = '${{ steps.version.outputs.version }}';
            fprintf('Setting USTB version to %s\n', version);
            matlab.addons.toolbox.toolboxVersion('USTB.prj', version);
            matlab.addons.toolbox.packageToolbox('USTB.prj');
            fprintf('Toolbox packaged successfully: USTB.mltbx\n');

      - name: Upload toolbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: USTB-${{ steps.version.outputs.version }}
          path: USTB.mltbx

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: USTB.mltbx
          name: USTB ${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
