name: Python Tests

on:
  pull_request:
    paths:
      - 'python/**'
  push:
    branches: [master]
    paths:
      - 'python/**'

jobs:
  test:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package with dev dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: python
        run: pytest tests/test_enums.py tests/test_apodization.py tests/test_beamformed_data.py tests/test_das.py -v
